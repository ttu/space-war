<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space War — Tactical Fleet Combat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deepest: #020408;
        --bg-surface: #0a0e18;
        --border-subtle: rgba(60, 140, 255, 0.15);
        --text-primary: #c8d8f0;
        --text-secondary: #6888a8;
        --text-muted: #384858;
        --accent-blue: #4488cc;
        --accent-cyan: #44cccc;
        --status-green: #44cc66;
        --status-red: #cc4444;
        --status-yellow: #ccaa44;
        --font-mono: 'Courier New', 'Consolas', monospace;
      }

      body {
        background: var(--bg-deepest);
        color: var(--text-primary);
        font-family: var(--font-mono);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* UI root (panels created by JS) */
      #ui-root {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      #ui-root > * {
        pointer-events: auto;
      }

      /* Time controls (created by TimeControls.ts) */
      #time-controls,
      .time-controls-panel {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(10, 14, 24, 0.85);
        border: 1px solid var(--border-subtle);
        padding: 6px 16px;
        border-radius: 4px;
        font-size: 13px;
        user-select: none;
      }

      .time-controls-panel button,
      .time-controls-panel .game-time,
      .time-controls-panel .paused-label,
      .time-controls-panel .camera-lock-wrap,
      .time-controls-panel #btn-loadout {
        pointer-events: auto;
      }

      .time-controls-panel button {
        background: transparent;
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        padding: 4px 10px;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        border-radius: 3px;
      }

      .time-controls-panel button:hover {
        color: var(--text-primary);
        border-color: var(--accent-blue);
      }

      .time-controls-panel button.active {
        color: var(--accent-cyan);
        border-color: var(--accent-cyan);
      }

      .time-controls-panel .game-time {
        color: var(--accent-cyan);
        margin-left: 12px;
        min-width: 80px;
      }

      .time-controls-panel .paused-label {
        color: var(--status-yellow);
        font-weight: bold;
        display: none;
      }

      .time-controls-panel .paused-label.visible {
        display: inline;
      }

      .time-controls-panel .targeting-readout {
        color: var(--status-green);
        margin-left: 8px;
        font-size: 11px;
        display: none;
      }

      .time-controls-panel .targeting-readout.visible {
        display: inline;
      }

      .time-controls-panel .camera-lock-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: 8px;
        padding: 2px 8px;
        background: rgba(68, 204, 204, 0.15);
        border: 1px solid var(--accent-cyan);
        border-radius: 3px;
        color: var(--accent-cyan);
        font-size: 11px;
      }

      .time-controls-panel .camera-lock-label {
        font-weight: bold;
      }

      .time-controls-panel .camera-lock-free {
        padding: 2px 6px;
        font-size: 11px;
      }

      /* Left sidebar: fleet + ship detail */
      .left-panel {
        position: absolute;
        left: 12px;
        top: 56px;
        bottom: 120px;
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        contain: layout style paint;
        transform: translateZ(0);
      }

      .fleet-panel,
      .ship-detail-panel,
      .contacts-panel {
        background: rgba(10, 14, 24, 0.9);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 8px;
        font-size: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        contain: layout style paint;
      }

      .contacts-panel-list {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }

      .contacts-panel-summary {
        font-size: 10px;
        color: var(--text-muted);
        margin-bottom: 6px;
        padding: 4px 0;
        border-bottom: 1px solid var(--border-subtle);
        line-height: 1.4;
        min-height: 2.8em;
        flex-shrink: 0;
      }

      .contacts-panel-summary-row {
        min-height: 1.4em;
      }

      .contacts-panel-row {
        padding: 4px 6px;
        border-radius: 3px;
        margin-bottom: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .contacts-panel-name {
        font-weight: bold;
        cursor: pointer;
        color: var(--text-primary);
      }

      .contacts-panel-meta {
        font-size: 10px;
        color: var(--text-secondary);
      }

      .contacts-panel-location {
        font-size: 10px;
        color: var(--text-muted);
      }

      .contacts-panel-lost {
        color: var(--status-red);
      }

      .fleet-panel-header,
      .ship-detail-header,
      .contacts-panel-header,
      .order-bar-header,
      .combat-log-header {
        color: var(--accent-cyan);
        font-weight: bold;
        margin-bottom: 6px;
        font-size: 11px;
        text-transform: uppercase;
      }

      .fleet-panel-list {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }

      .fleet-panel-row {
        padding: 4px 6px;
        border-radius: 3px;
        margin-bottom: 4px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .fleet-panel-row.selected {
        background: rgba(68, 136, 204, 0.2);
        border: 1px solid var(--accent-blue);
      }

      .fleet-panel-name {
        font-weight: bold;
        cursor: pointer;
      }

      .fleet-panel-bar-wrap {
        height: 4px;
        background: var(--bg-deepest);
        border-radius: 2px;
        overflow: hidden;
      }

      .fleet-panel-bar {
        height: 100%;
        background: var(--status-green);
        transition: width 0.15s ease;
      }

      .ship-detail-content {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
        font-size: 11px;
        line-height: 1.5;
      }

      .ship-detail-name {
        font-weight: bold;
        margin-bottom: 6px;
        color: var(--text-primary);
      }

      .ship-detail-row {
        margin-bottom: 4px;
        color: var(--text-secondary);
      }

      .ship-detail-empty,
      .ship-detail-multi {
        color: var(--text-muted);
        font-style: italic;
      }

      .ship-detail-lost {
        color: var(--status-yellow);
      }

      .ship-detail-muted {
        color: var(--text-muted);
      }

      .ship-detail-warning {
        color: var(--status-red, #cc4444);
        font-weight: bold;
      }

      .ship-detail-target {
        color: var(--accent-cyan, #44cccc);
      }

      .ship-detail-weapon-railgun {
        font-size: 10px;
        color: var(--text-secondary);
      }

      .ship-detail-separator {
        border: none;
        border-top: 1px solid var(--border-subtle, #333);
        margin: 6px 0;
      }

      .ship-detail-lock-camera {
        margin-top: 8px;
        padding: 6px 10px;
        background: rgba(68, 204, 204, 0.15);
        border: 1px solid var(--accent-cyan);
        color: var(--accent-cyan);
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 11px;
        border-radius: 3px;
        width: 100%;
      }

      .ship-detail-lock-camera:hover {
        background: rgba(68, 204, 204, 0.25);
      }

      /* Order bar */
      .order-bar-wrap {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 11;
      }

      .order-bar-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        background: rgba(10, 14, 24, 0.9);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 8px;
        font-size: 12px;
      }

      .order-bar-header {
        width: 100%;
        margin-bottom: 4px;
      }

      .order-bar-btn {
        background: transparent;
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        padding: 4px 10px;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 11px;
        border-radius: 3px;
      }

      .order-bar-btn:hover {
        color: var(--text-primary);
        border-color: var(--accent-blue);
      }

      .order-bar-btn.active {
        color: var(--accent-cyan);
        border-color: var(--accent-cyan);
      }

      /* Combat log */
      .combat-log-wrap {
        position: absolute;
        right: 12px;
        bottom: 12px;
        width: 280px;
        max-height: 180px;
        z-index: 11;
      }

      .combat-log-panel {
        background: rgba(10, 14, 24, 0.9);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 8px;
        font-size: 11px;
        display: flex;
        flex-direction: column;
        height: 100%;
        max-height: 180px;
      }

      .combat-log-list {
        overflow-y: auto;
        flex: 1;
        min-height: 0;
        font-family: var(--font-mono);
      }

      .combat-log-line {
        padding: 2px 0;
        border-bottom: 1px solid var(--border-subtle);
        color: var(--text-secondary);
      }

      /* Info overlay */
      #info-overlay {
        position: absolute;
        bottom: 12px;
        left: 240px;
        font-size: 11px;
        color: var(--text-muted);
        z-index: 10;
        line-height: 1.6;
        pointer-events: none;
      }

      /* Camera lock on-screen indicator */
      .camera-lock-indicator {
        position: absolute;
        top: 56px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 14px;
        background: rgba(68, 204, 204, 0.25);
        border: 1px solid var(--accent-cyan);
        border-radius: 4px;
        color: var(--accent-cyan);
        font-size: 13px;
        font-weight: bold;
        z-index: 10;
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
