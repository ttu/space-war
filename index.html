<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space War — Tactical Fleet Combat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deepest: #020408;
        --bg-surface: #0a0e18;
        --border-subtle: rgba(60, 140, 255, 0.15);
        --text-primary: #c8d8f0;
        --text-secondary: #6888a8;
        --text-muted: #384858;
        --accent-blue: #4488cc;
        --accent-cyan: #44cccc;
        --status-green: #44cc66;
        --status-red: #cc4444;
        --status-yellow: #ccaa44;
        --font-mono: 'Courier New', 'Consolas', monospace;
      }

      body {
        background: var(--bg-deepest);
        color: var(--text-primary);
        font-family: var(--font-mono);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Time controls overlay */
      #time-controls {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(10, 14, 24, 0.85);
        border: 1px solid var(--border-subtle);
        padding: 6px 16px;
        border-radius: 4px;
        font-size: 13px;
        z-index: 10;
        user-select: none;
        pointer-events: none;
      }

      #time-controls button,
      #time-controls .game-time,
      #time-controls .paused-label {
        pointer-events: auto;
      }

      #time-controls button {
        background: transparent;
        border: 1px solid var(--border-subtle);
        color: var(--text-secondary);
        padding: 4px 10px;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        border-radius: 3px;
      }

      #time-controls button:hover {
        color: var(--text-primary);
        border-color: var(--accent-blue);
      }

      #time-controls button.active {
        color: var(--accent-cyan);
        border-color: var(--accent-cyan);
      }

      #time-controls .game-time {
        color: var(--accent-cyan);
        margin-left: 12px;
        min-width: 80px;
      }

      #time-controls .paused-label {
        color: var(--status-yellow);
        font-weight: bold;
        display: none;
      }

      #time-controls .paused-label.visible {
        display: inline;
      }

      /* Info overlay */
      #info-overlay {
        position: absolute;
        bottom: 12px;
        left: 12px;
        font-size: 11px;
        color: var(--text-muted);
        z-index: 10;
        line-height: 1.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>

      <div id="time-controls">
        <span class="paused-label" id="paused-label">PAUSED</span>
        <button id="btn-pause" title="Space">⏸</button>
        <button id="btn-1x" class="active">1x</button>
        <button id="btn-2x">2x</button>
        <button id="btn-4x">4x</button>
        <button id="btn-10x">10x</button>
        <button id="btn-20x">20x</button>
        <button id="btn-50x">50x</button>
        <button id="btn-100x">100x</button>
        <span class="game-time" id="game-time">T+00:00</span>
      </div>

      <div id="info-overlay">
        WASD/Arrows: Pan | Scroll: Zoom | Space: Pause | +/-: Speed
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
